name: Deploy (GitHub Pages)

# Manual only — nothing publishes until you run this from the Actions tab. The host is not
# locked in (see spec 022); flip to `push: { branches: [master] }` to auto-deploy once decided.
on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; don't cancel an in-progress publish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      # GitHub Pages serves a project site under /<repo>/ — build with that base path.
      - run: npm run build
        env:
          BASE_PATH: /snapfinity/
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
